# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    if: github.repository == 'ravigummadi/smallbets.live'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Production env vars come from GitHub repo variables (Settings >
      # Actions > Variables). Vite inlines VITE_* env vars at build time.
      - name: Build frontend
        run: cd frontend && npm ci && npm run build
        env:
          VITE_USE_FIREBASE_EMULATOR: ${{ vars.VITE_USE_FIREBASE_EMULATOR }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMALLBETS_APP }}
          channelId: live
          projectId: smallbets-app
