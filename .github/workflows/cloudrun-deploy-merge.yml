name: Deploy Backend to Cloud Run on merge
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    if: github.repository == 'ravigummadi/smallbets.live'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CLOUDRUN_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy smallbets-api \
            --source ./backend \
            --region us-west2 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars FIREBASE_PROJECT_ID=smallbets-app \
            --set-env-vars "^||^CORS_ORIGINS=https://smallbets-app.web.app,https://smallbets-app.firebaseapp.com" \
            --project smallbets-app
