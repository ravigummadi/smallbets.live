          VITE_FIREBASE_AUTH_DOMAIN: smallbets-app.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: smallbets-app
          VITE_FIREBASE_STORAGE_BUCKET: smallbets-app.firebasestorage.app
